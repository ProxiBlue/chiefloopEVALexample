<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mage Lander</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        (function () {
            'use strict';

            // --- Canvas Setup ---
            var canvas = document.getElementById('gameCanvas');
            var ctx = canvas.getContext('2d');

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- Game State ---
            var STATES = {
                MENU: 'menu',
                PLAYING: 'playing',
                LANDED: 'landed',
                CRASHED: 'crashed',
                GAMEOVER: 'gameover'
            };

            var gameState = STATES.MENU;

            // --- Level Configuration ---
            var levels = [
                { gravity: 1.6 },   // Level 1: lunar-like gravity (~1.6 m/s^2)
                { gravity: 2.0 },   // Level 2: slightly stronger gravity
                { gravity: 2.5 }    // Level 3: heavier world
            ];
            var currentLevel = 0;

            // --- Physics Constants ---
            var GRAVITY = levels[currentLevel].gravity;  // m/s^2, configurable per level
            var THRUST_POWER = 1.6;     // m/s^2, matches gravity at level 1 for hover equilibrium
            var PIXELS_PER_METER = 50;  // scale factor: 1 m/s = 50 px/s

            // --- Terrain ---
            var terrain = [];       // array of {x, y} points
            var landingPadIndex = -1; // index into terrain[] where the flat landing pad starts

            function generateTerrain() {
                terrain = [];
                var w = canvas.width;
                var h = canvas.height;
                var segmentCount = 40;
                var segWidth = w / segmentCount;

                // Pick a random segment for the landing pad (flat section)
                // Keep it away from edges so it's reachable
                landingPadIndex = 5 + Math.floor(Math.random() * (segmentCount - 12));
                var padWidth = 2; // number of segments that are flat

                // Base terrain height range (bottom 40% of screen)
                var minY = h * 0.55;
                var maxY = h * 0.85;

                for (var i = 0; i <= segmentCount; i++) {
                    var x = i * segWidth;
                    var y;

                    if (i >= landingPadIndex && i <= landingPadIndex + padWidth) {
                        // Flat landing pad section — all at the same height
                        if (i === landingPadIndex) {
                            y = minY + Math.random() * (maxY - minY) * 0.6 + (maxY - minY) * 0.2;
                        } else {
                            y = terrain[landingPadIndex].y;
                        }
                    } else {
                        // Jagged terrain with varied peaks and valleys
                        y = minY + Math.random() * (maxY - minY);
                    }

                    terrain.push({ x: x, y: y });
                }
            }

            function drawTerrain() {
                if (terrain.length === 0) return;

                // Filled polygon: terrain line segments + bottom corners
                ctx.beginPath();
                ctx.moveTo(terrain[0].x, terrain[0].y);
                for (var i = 1; i < terrain.length; i++) {
                    ctx.lineTo(terrain[i].x, terrain[i].y);
                }
                // Close along the bottom of the canvas
                ctx.lineTo(canvas.width, canvas.height);
                ctx.lineTo(0, canvas.height);
                ctx.closePath();

                ctx.fillStyle = '#444';
                ctx.fill();

                // Stroke the top surface
                ctx.beginPath();
                ctx.moveTo(terrain[0].x, terrain[0].y);
                for (var i = 1; i < terrain.length; i++) {
                    ctx.lineTo(terrain[i].x, terrain[i].y);
                }
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Highlight landing pad
                if (landingPadIndex >= 0 && landingPadIndex < terrain.length - 1) {
                    var padStart = terrain[landingPadIndex];
                    var padEnd = terrain[landingPadIndex + 2] || terrain[terrain.length - 1];
                    ctx.beginPath();
                    ctx.moveTo(padStart.x, padStart.y);
                    ctx.lineTo(padEnd.x, padEnd.y);
                    ctx.strokeStyle = '#0f0';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }

            // --- Ship ---
            var ship = {
                x: 0,
                y: 0,
                vx: 0,              // velocity in pixels/s
                vy: 0,              // velocity in pixels/s
                angle: 0,           // radians, 0 = upright
                rotationSpeed: 3,   // radians per second
                thrusting: false    // whether thrust is currently active
            };

            function resetShip() {
                ship.x = canvas.width / 2;
                ship.y = canvas.height / 3;
                ship.vx = 0;
                ship.vy = 0;
                ship.angle = 0;
                ship.thrusting = false;
            }

            function drawShip(x, y, angle, size, thrusting) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);

                // Mage-OS "M" logo as a spacecraft
                // The M is drawn centered at (0,0) with the given size
                var s = size;
                var halfW = s * 0.5;
                var halfH = s * 0.6;

                ctx.beginPath();
                ctx.strokeStyle = '#f26322';
                ctx.fillStyle = '#f26322';
                ctx.lineWidth = s * 0.08;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';

                // Outer M shape — five points forming the M
                // Left leg base
                ctx.moveTo(-halfW, halfH);
                // Left leg top
                ctx.lineTo(-halfW, -halfH);
                // Center valley — down to middle
                ctx.lineTo(-halfW * 0.35, -halfH * 0.15);
                // Peak tip (top center) — the nose of the ship
                ctx.lineTo(0, -halfH);
                // Right inner valley
                ctx.lineTo(halfW * 0.35, -halfH * 0.15);
                // Right leg top
                ctx.lineTo(halfW, -halfH);
                // Right leg base
                ctx.lineTo(halfW, halfH);

                ctx.stroke();

                // Draw small accent marks at the base to suggest thrusters
                ctx.beginPath();
                ctx.moveTo(-halfW * 0.5, halfH);
                ctx.lineTo(-halfW * 0.5, halfH + s * 0.08);
                ctx.moveTo(0, halfH);
                ctx.lineTo(0, halfH + s * 0.08);
                ctx.moveTo(halfW * 0.5, halfH);
                ctx.lineTo(halfW * 0.5, halfH + s * 0.08);
                ctx.strokeStyle = '#f26322';
                ctx.lineWidth = s * 0.04;
                ctx.stroke();

                // Draw thrust flame when thrusting
                if (thrusting) {
                    var flameLen = s * (0.4 + Math.random() * 0.25);
                    ctx.beginPath();
                    ctx.moveTo(-halfW * 0.35, halfH);
                    ctx.lineTo(0, halfH + flameLen);
                    ctx.lineTo(halfW * 0.35, halfH);
                    ctx.fillStyle = '#ff0';
                    ctx.fill();

                    // Inner flame
                    var innerLen = flameLen * 0.6;
                    ctx.beginPath();
                    ctx.moveTo(-halfW * 0.18, halfH);
                    ctx.lineTo(0, halfH + innerLen);
                    ctx.lineTo(halfW * 0.18, halfH);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                }

                ctx.restore();
            }

            // --- Timing ---
            var lastTime = 0;

            // --- Input ---
            var keys = {};
            window.addEventListener('keydown', function (e) {
                keys[e.key] = true;
                if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    e.preventDefault();
                }
                handleKeyPress(e.key);
            });
            window.addEventListener('keyup', function (e) {
                keys[e.key] = false;
            });

            function handleKeyPress(key) {
                if (key === ' ') {
                    if (gameState === STATES.MENU) {
                        currentLevel = 0;
                        GRAVITY = levels[currentLevel].gravity;
                        resetShip();
                        generateTerrain();
                        gameState = STATES.PLAYING;
                    } else if (gameState === STATES.LANDED) {
                        // Advance to next level (or game over if no more levels)
                        currentLevel++;
                        if (currentLevel >= levels.length) {
                            currentLevel = 0;
                            gameState = STATES.GAMEOVER;
                            return;
                        }
                        GRAVITY = levels[currentLevel].gravity;
                        resetShip();
                        generateTerrain();
                        gameState = STATES.PLAYING;
                    } else if (gameState === STATES.GAMEOVER) {
                        currentLevel = 0;
                        GRAVITY = levels[currentLevel].gravity;
                        gameState = STATES.MENU;
                    }
                }
                if (key === 'r' || key === 'R') {
                    if (gameState === STATES.PLAYING || gameState === STATES.CRASHED) {
                        GRAVITY = levels[currentLevel].gravity;
                        resetShip();
                        generateTerrain();
                        gameState = STATES.PLAYING;
                    }
                }
            }

            // --- Update ---
            function update(dt) {
                if (gameState === STATES.PLAYING) {
                    // Ship rotation
                    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                        ship.angle -= ship.rotationSpeed * dt;
                    }
                    if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                        ship.angle += ship.rotationSpeed * dt;
                    }

                    // Gravity — accelerates downward (positive Y is down in canvas)
                    ship.vy += GRAVITY * PIXELS_PER_METER * dt;

                    // Thrust — applied in the direction the ship is facing (nose = -Y when angle=0)
                    ship.thrusting = !!(keys['ArrowUp'] || keys['w'] || keys['W']);
                    if (ship.thrusting) {
                        ship.vx += Math.sin(ship.angle) * THRUST_POWER * PIXELS_PER_METER * dt;
                        ship.vy += -Math.cos(ship.angle) * THRUST_POWER * PIXELS_PER_METER * dt;
                    }

                    // Update position
                    ship.x += ship.vx * dt;
                    ship.y += ship.vy * dt;

                    // Clamp left/right edges — ship cannot leave the viewport
                    if (ship.x < 0) {
                        ship.x = 0;
                        ship.vx = 0;
                    } else if (ship.x > canvas.width) {
                        ship.x = canvas.width;
                        ship.vx = 0;
                    }
                }
            }

            // --- Render ---
            function renderMenu() {
                // Draw ship logo on menu
                drawShip(canvas.width / 2, canvas.height / 2 - 100, 0, 60);

                ctx.fillStyle = '#f26322';
                ctx.font = 'bold 48px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('MAGE LANDER', canvas.width / 2, canvas.height / 2);

                ctx.fillStyle = '#888';
                ctx.font = '20px sans-serif';
                ctx.fillText('Press SPACE to start', canvas.width / 2, canvas.height / 2 + 50);
            }

            function renderPlaying() {
                // Draw terrain
                drawTerrain();

                // Draw ship
                drawShip(ship.x, ship.y, ship.angle, 40, ship.thrusting);

                // HUD hint
                ctx.fillStyle = '#555';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Arrow keys to steer | UP or W for thrust', canvas.width / 2, canvas.height - 30);
            }

            function renderLanded() {
                drawTerrain();
                drawShip(ship.x, ship.y, ship.angle, 40, false);

                ctx.fillStyle = '#4CAF50';
                ctx.font = 'bold 36px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('LANDED!', canvas.width / 2, canvas.height / 2 - 20);

                ctx.fillStyle = '#888';
                ctx.font = '20px sans-serif';
                ctx.fillText('Press SPACE for next level', canvas.width / 2, canvas.height / 2 + 30);
            }

            function renderCrashed() {
                drawTerrain();
                drawShip(ship.x, ship.y, ship.angle, 40, false);

                ctx.fillStyle = '#f44336';
                ctx.font = 'bold 36px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('CRASHED!', canvas.width / 2, canvas.height / 2 - 20);

                ctx.fillStyle = '#888';
                ctx.font = '20px sans-serif';
                ctx.fillText('Press R to retry', canvas.width / 2, canvas.height / 2 + 30);
            }

            function renderGameOver() {
                ctx.fillStyle = '#f44336';
                ctx.font = 'bold 36px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);

                ctx.fillStyle = '#888';
                ctx.font = '20px sans-serif';
                ctx.fillText('Press SPACE to return to menu', canvas.width / 2, canvas.height / 2 + 30);
            }

            function render() {
                // Clear canvas with dark background
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                switch (gameState) {
                    case STATES.MENU:
                        renderMenu();
                        break;
                    case STATES.PLAYING:
                        renderPlaying();
                        break;
                    case STATES.LANDED:
                        renderLanded();
                        break;
                    case STATES.CRASHED:
                        renderCrashed();
                        break;
                    case STATES.GAMEOVER:
                        renderGameOver();
                        break;
                }
            }

            // --- Game Loop ---
            function gameLoop(timestamp) {
                var dt = (timestamp - lastTime) / 1000;
                lastTime = timestamp;

                // Clamp delta time to avoid spiral of death on tab switch
                if (dt > 0.1) {
                    dt = 0.1;
                }

                update(dt);
                render();

                requestAnimationFrame(gameLoop);
            }

            // Start the loop
            requestAnimationFrame(function (timestamp) {
                lastTime = timestamp;
                gameLoop(timestamp);
            });
        })();
    </script>
</body>
</html>
