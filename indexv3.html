                ctx.font = 'bold 36px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', cx, y);

                y += 40;
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 28px sans-serif';
                ctx.fillText('Score: ' + score, cx, y);

                y += 30;
                ctx.fillStyle = '#ccc';
                ctx.font = '18px sans-serif';
                ctx.fillText('Level Reached: ' + gameOverLevel, cx, y);

                y += 30;

                if (gameOverEnteringName) {
                    // Name entry prompt
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 18px sans-serif';
                    ctx.fillText('NEW HIGH SCORE!', cx, y);
                    y += 28;
                    ctx.fillStyle = '#ccc';
                    ctx.font = '16px sans-serif';
                    ctx.fillText('Enter your name:', cx, y);
                    y += 28;
                    // Draw input box
                    var boxW = 200;
                    var boxH = 30;
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(cx - boxW / 2, y - 20, boxW, boxH);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 18px monospace';
                    var displayName = gameOverName;
                    // Blinking cursor
                    if (Math.floor(Date.now() / 500) % 2 === 0) {
                        displayName += '_';
                    }
                    ctx.fillText(displayName, cx, y + 2);
                    y += 24;
                    ctx.fillStyle = '#888';
                    ctx.font = '14px sans-serif';
                    ctx.fillText('Press ENTER to confirm (max 10 chars)', cx, y);
                } else {
                    // Show leaderboard
                    y = drawLeaderboard(cx, y, gameOverName.trim() || null);
                    y += 15;
                    ctx.fillStyle = '#888';
                    ctx.font = '20px sans-serif';
                    ctx.fillText('Press Space to Play Again', cx, y);
                }
            }

            function render() {
                // Clear canvas with dark background
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw starfield background
                drawStars();

                // Apply screen shake offset
                var shaking = screenShake > 0;
                if (shaking) {
                    var shakeX = (Math.random() - 0.5) * 2 * SCREEN_SHAKE_INTENSITY * (screenShake / SCREEN_SHAKE_DURATION);
                    var shakeY = (Math.random() - 0.5) * 2 * SCREEN_SHAKE_INTENSITY * (screenShake / SCREEN_SHAKE_DURATION);
                    ctx.save();
                    ctx.translate(shakeX, shakeY);
                }

                switch (gameState) {
                    case STATES.MENU:
                        renderMenu();
                        break;
                    case STATES.PLAYING:
                        renderPlaying();
                        break;
                    case STATES.LANDED:
                        renderLanded();
                        break;
                    case STATES.CRASHED:
                        renderCrashed();
                        break;
                    case STATES.GAMEOVER:
                        renderGameOver();
                        break;
                }

                // Restore screen shake offset
                if (shaking) {
                    ctx.restore();
                }
            }

            // --- Game Loop ---
            function gameLoop(timestamp) {
                var dt = (timestamp - lastTime) / 1000;
                lastTime = timestamp;

                // Clamp delta time to avoid spiral of death on tab switch
                if (dt > 0.1) {
                    dt = 0.1;
                }

                update(dt);
                render();

                requestAnimationFrame(gameLoop);
            }

            // Generate initial starfield
            generateStars();

            // Start the loop
            requestAnimationFrame(function (timestamp) {
                lastTime = timestamp;
                gameLoop(timestamp);
            });
        })();
    </script>
</body>
</html>
